name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  python:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install package and test dependencies
        run: python -m pip install -e ".[dev,alignment]"

      - name: Ruff
        run: ruff check .

      - name: Mypy
        run: mypy --python-version ${{ matrix.python-version }}

      - name: Pytest
        env:
          XINGYU_ALIGN_LOCALE: en-US
        run: pytest

  docker:
    name: Docker smoke
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build local image
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: xingyu-lyrics-aligner:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test CLI help
        run: docker run --rm xingyu-lyrics-aligner:ci xingyu-align --help

      - name: Smoke test doctor
        run: docker run --rm xingyu-lyrics-aligner:ci xingyu-align doctor

      - name: Smoke test non-root user
        run: test "$(docker run --rm xingyu-lyrics-aligner:ci id -u)" = "10001"

      - name: Smoke test bundled NLTK punkt_tab offline
        run: |
          docker run --rm --network none xingyu-lyrics-aligner:ci \
            python -c "import nltk; from nltk.tokenize.punkt import PunktTokenizer; print(nltk.data.find('tokenizers/punkt_tab/english/')); print(PunktTokenizer('english').tokenize('Xingyu aligns lyrics.'))"

      - name: Smoke test alignment runtime imports
        run: |
          docker run --rm xingyu-lyrics-aligner:ci \
            python -c "import whisperx, torchcodec, nltk; print('ok')"

      - name: Smoke test worker help
        run: docker run --rm xingyu-lyrics-aligner:ci xingyu-align worker run --help
